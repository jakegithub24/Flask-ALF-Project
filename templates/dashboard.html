<!-- templates/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | FlowTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }
        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .jumpscare {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        .pulse-ring {
            animation: pulseRed 1.5s infinite;
        }
        body {
            background: linear-gradient(135deg, #1e1a2f 0%, #2d1b3c 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .prank-card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid #ff4d4d;
            transform: rotate(-1deg);
        }
        .evil-laugh {
            font-size: 5rem;
            filter: drop-shadow(0 0 8px #ff0000);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full prank-card rounded-2xl p-8 md:p-12 text-center jumpscare">
        <div class="mb-6 pulse-ring inline-block rounded-full p-4">
            <i class="fas fa-skull evil-laugh text-red-500"></i>
        </div>
        <h1 class="text-5xl md:text-7xl font-black text-red-500 mb-4 tracking-tight">
            APRIL FOOL!
        </h1>
        <div class="text-3xl md:text-4xl font-bold text-white mb-6">
            There's nothing in this app you fool
        </div>
        <div class="text-xl text-gray-300 mb-8 flex items-center justify-center gap-3">
            <i class="fas fa-laugh-squint text-yellow-400 text-2xl"></i>
            <span>You've been pranked!</span>
            <i class="fas fa-laugh-beam text-yellow-400 text-2xl"></i>
        </div>
        
        <div class="bg-red-900/30 rounded-xl p-4 mb-8 border border-red-500/50">
            <p class="text-gray-200 text-sm">
                <i class="fas fa-info-circle mr-1"></i> 
                This is a harmless April Fools' joke. No data was collected, and your account is safe.
            </p>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('logout') }}" class="inline-flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-xl transition duration-200 transform hover:scale-105">
                <i class="fas fa-sign-out-alt"></i> Logout & Run Away
            </a>
            <button onclick="location.reload()" class="inline-flex items-center justify-center gap-2 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-xl transition duration-200">
                <i class="fas fa-redo-alt"></i> Reload the Joke
            </button>
        </div>
        
        <div class="mt-8 text-gray-400 text-xs">
            <i class="fas fa-calendar-alt"></i> April 1st — Stay vigilant!
        </div>
    </div>
    
    <script>
        // Add some dramatic effect on load
        window.addEventListener('load', () => {
            // Play a spooky laugh sound? Not auto-playing due to browser policies, but we can add a small easter egg
            console.log("%c🔪 APRIL FOOL! There's nothing here! 🔪", "color: red; font-size: 16px; font-weight: bold;");
            // Optional: vibrate if supported
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }
        });
    </script>
</body>
</html>
